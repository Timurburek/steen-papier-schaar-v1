<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steen Papier Schaar v2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Steen Papier Schaar v2</h1>
    <div class="score-board">
        <p>Computer: <span id="computer-keuze">?</span></p>
        <p>Jouw keuze: <span id="jouw-keuze">Maak je keuze!</span></p>
        <p>Uitkomst: <span id="resultaat">-</span></p>
        <p>Huidige Win-streak: <span id="score">0</span></p>
    </div>

    <div id="knoppen-container">
        <button id="steen">Steen</button>
        <button id="papier">Papier</button>
        <button id="schaar">Schaar</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
